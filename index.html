<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Siphosethu Zuma - Portfolio</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            overflow-x: hidden;
        }

        body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            background-color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: #333;
        }

        main {
            flex: 1;
            width: 100%;
        }

        /* Navigation Styles - Matching your working portfolio */
        .nav-link {
            position: relative;
            color: #444444 !important;
            text-decoration: none !important;
            transition: color 0.3s ease;
            padding: 0.5rem 1rem;
            margin: 0 5px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .nav-link:hover {
            color: #666666 !important;
        }

        .nav-link.active {
            color: #222222 !important;
            font-weight: 500;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 1rem;
            width: 0;
            height: 1px;
            background-color: #999;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: calc(80% - 1rem);
        }

        .nav-link.active::after {
            width: calc(80% - 1rem) !important;
            background-color: #222 !important;
        }

        .social-icons svg {
            width: 22px;
            height: 22px;
            fill: #777;
            transition: all 0.2s ease;
            opacity: 0.7;
        }

        .social-icons a:hover svg {
            fill: #333;
            opacity: 1;
            transform: translateY(-2px);
        }

        .btn-hover {
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba(0, 0, 0, 0.5)' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }

        .navbar-toggler {
            border: none;
            padding: 0.5rem;
        }

        .navbar-toggler:focus {
            box-shadow: none;
        }

        .navbar {
            background-color: #f8f8f8 !important;
            padding: 1.5rem 1rem !important;
            box-shadow: 0 1px 0 rgba(0, 0, 0, 0.05) !important;
            z-index: 1000;
            position: sticky;
            top: 0;
            border-bottom: 1px solid #eaeaea;
        }

        .navbar-brand {
            color: #222 !important;
            font-weight: 400;
            letter-spacing: 0.5px;
            font-size: 1.3rem;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 1rem 1rem !important;
            }
            .navbar-brand {
                font-size: 1.1rem;
            }
        }

        footer {
            background-color: #f8f8f8 !important;
            padding: 1.5rem 0;
            text-align: center;
            border-top: 1px solid #eaeaea;
        }
        
        footer .container a {
            color: #777;
            text-decoration: none;
            display: block;
            text-align: center;
            margin: 0 auto;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: color 0.2s ease;
        }
        
        footer .container a:hover {
            color: #333;
        }

        /* ========== HERO SECTION - EXACT SAME AS YOUR WORKING PORTFOLIO ========== */
        .hero-section {
            position: relative;
            background-image: url('images/BackgroundImg2.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* Semi-transparent overlay */
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.55);
            z-index: 1;
        }

        /* Content to appear above overlay */
        .hero-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 5rem;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(40px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .intro-heading:first-of-type {
            animation: slideInLeft 1s ease forwards;
        }

        .intro-heading:last-of-type {
            animation: slideInRight 1s ease forwards;
            animation-delay: 0.2s;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        .about-btn {
            background-color: transparent;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 12px 40px;
            font-size: 0.95rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 2rem;
            animation: fadeInScale 1s ease 0.4s forwards;
            opacity: 0;
            animation-fill-mode: forwards;
            text-transform: uppercase;
            background-color: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(3px);
            border-radius: 40px;
        }

        .about-btn:hover {
            background-color: white;
            color: #222;
            border-color: white;
            transform: translateY(-3px);
            backdrop-filter: blur(0);
        }

        .intro-heading {
            font-size: 2.5rem;
            font-weight: 300;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
            margin: 0.3rem 0;
            letter-spacing: -0.3px;
            line-height: 1.3;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .intro-heading {
                font-size: 2rem;
            }
            .about-btn {
                padding: 10px 30px;
                font-size: 0.85rem;
            }
            .hero-content {
                padding-bottom: 3rem;
            }
        }

        @media (max-width: 576px) {
            .intro-heading {
                font-size: 1.7rem;
            }
            .about-btn {
                padding: 8px 24px;
                font-size: 0.8rem;
                margin-top: 1.5rem;
            }
            .navbar-collapse {
                margin-top: 1rem;
            }
            .social-icons {
                justify-content: center;
                margin-top: 0.75rem;
            }
            .nav-link {
                text-align: center;
                padding: 0.6rem 0.5rem;
            }
        }

        /* WhatsApp Float */
        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background-color: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            text-decoration: none;
            animation: fadeInUp 0.5s ease 0.6s forwards;
            opacity: 0;
            animation-fill-mode: forwards;
        }

        .whatsapp-float:hover {
            transform: scale(1.08);
            background-color: #20b859;
        }

        .whatsapp-float svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        @media (max-width: 768px) {
            .whatsapp-float {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }
            .whatsapp-float svg {
                width: 28px;
                height: 28px;
            }
        }
    </style>
</head>

    <script>
        document.querySelector('.about-btn')?.addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'About.html';
        });
        
        const navLinks = document.querySelectorAll('.nav-link');
        const navbarCollapse = document.querySelector('.navbar-collapse');
        if (navbarCollapse) {
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    if (window.innerWidth < 576) {
                        const bsCollapse = bootstrap.Collapse.getInstance(navbarCollapse);
                        if (bsCollapse) bsCollapse.hide();
                    }
                });
            });
        }
    </script>
